{{- if .Values.deployment.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.nameOverride }}-{{ .Values.deployment.nameSuffix }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.nameOverride }}-{{ .Values.deployment.nameSuffix }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.nameOverride }}-{{ .Values.deployment.nameSuffix }}
    spec:
      containers:
        - name: {{ .Values.deployment.nameSuffix }}
          image: {{ .Values.deployment.image }}
          command: ["sleep", "3600"]
{{- end }}
