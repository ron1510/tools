services:
  gremlin-server:
    build:
      context: .
      args:
        TINKERPOP_VERSION: ${TINKERPOP_VERSION:-3.8.1}
        ARANGO_TINKERPOP_PROVIDER_VERSION: ${ARANGO_TINKERPOP_PROVIDER_VERSION:-4.0.0}
    environment:
      GREMLIN_SERVER_PORT: ${GREMLIN_SERVER_PORT:-8182}
      GREMLIN_TRAVERSAL_SOURCE: ${GREMLIN_TRAVERSAL_SOURCE:-g}
      ARANGO_HOST: ${ARANGO_HOST:-host.docker.internal}
      ARANGO_PORT: ${ARANGO_PORT:-8529}
      ARANGO_USER: ${ARANGO_USER:-root}
      ARANGO_PASSWORD: ${ARANGO_PASSWORD:-change-me}
      ARANGO_DATABASE: ${ARANGO_DATABASE:-_system}
      ARANGO_GRAPH: ${ARANGO_GRAPH:-my_graph}
      ARANGO_ORPHAN_COLLECTIONS_YAML: ${ARANGO_ORPHAN_COLLECTIONS_YAML:-}
      ARANGO_EDGE_DEFINITIONS_YAML: ${ARANGO_EDGE_DEFINITIONS_YAML:-"depends_on:[services]->[services]"}
      ARANGO_GRAPH_TYPE: ${ARANGO_GRAPH_TYPE:-COMPLEX}
      ARANGO_ENABLE_DATA_DEFINITION: ${ARANGO_ENABLE_DATA_DEFINITION:-false}
    ports:
      - "${GREMLIN_SERVER_PORT:-8182}:${GREMLIN_SERVER_PORT:-8182}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
