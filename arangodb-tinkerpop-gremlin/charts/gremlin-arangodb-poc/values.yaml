image:
  repository: ron1510/gremlin-arangodb
  tag: 3.8.1-arangodb-4.0.0-arango311
  digest: sha256:bee0ad2ca8ed566218f0b18aad0e03432ff2a36622057bf5a1c6ec978b577eb6
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8182

gremlin:
  traversalSource: g
  logLevel: INFO

arangodb:
  host: arangodb.default.svc.cluster.local
  port: 8529
  database: my_db
  graph: my_graph
  graphType: COMPLEX
  auth:
    createSecret: true
    existingSecret: ""
    username: root
    password: change-me
    usernameKey: username
    passwordKey: password

topologySync:
  enabled: true
  schedule: "*/10 * * * *"
  prune: true
  edgePolicy: allVertexCollections
  logLevel: INFO
  image:
    repository: python
    tag: 3.12-alpine
    digest: sha256:dbb1970cc04ce7d381c65efe8309c0c03d463e5b35c88f14d721796ad24cfbfd
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 1Gi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 100
  runAsGroup: 101
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

nameOverride: ""
fullnameOverride: ""
