apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gremlin-arangodb-poc.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "gremlin-arangodb-poc.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "gremlin-arangodb-poc.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "gremlin-arangodb-poc.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: gremlin-server
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: gremlin
              containerPort: {{ .Values.service.port }}
          env:
            - name: GREMLIN_SERVER_PORT
              value: {{ .Values.service.port | quote }}
            - name: GREMLIN_TRAVERSAL_SOURCE
              value: {{ .Values.gremlin.traversalSource | quote }}
            - name: ARANGO_HOST
              value: {{ .Values.arangodb.host | quote }}
            - name: ARANGO_PORT
              value: {{ .Values.arangodb.port | quote }}
            - name: ARANGO_DATABASE
              value: {{ .Values.arangodb.database | quote }}
            - name: ARANGO_GRAPH
              value: {{ .Values.arangodb.graph | quote }}
            - name: ARANGO_ORPHAN_COLLECTIONS_YAML
              value: {{ if gt (len .Values.arangodb.orphanCollections) 0 }}{{ printf "\"%s\"" (first .Values.arangodb.orphanCollections) | quote }}{{ else }}""{{ end }}
            - name: ARANGO_EDGE_DEFINITIONS_YAML
              value: {{ printf "\"%s\"" (first .Values.arangodb.edgeDefinitions) | quote }}
            - name: ARANGO_GRAPH_TYPE
              value: {{ .Values.arangodb.graphType | quote }}
            - name: ARANGO_ENABLE_DATA_DEFINITION
              value: {{ ternary "true" "false" .Values.arangodb.enableDataDefinition | quote }}
            - name: ARANGO_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "gremlin-arangodb-poc.secretName" . }}
                  key: {{ .Values.arangodb.auth.usernameKey }}
            - name: ARANGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "gremlin-arangodb-poc.secretName" . }}
                  key: {{ .Values.arangodb.auth.passwordKey }}
            - name: JAVA_OPTS
              value: "-Dgremlin.server.logLevel={{ .Values.gremlin.logLevel }}"
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: gremlin
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: gremlin
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
