{{- if .Values.topologySync.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "gremlin-arangodb-poc.fullname" . }}-topology-sync
spec:
  schedule: {{ .Values.topologySync.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: {{ include "gremlin-arangodb-poc.name" . }}
            app.kubernetes.io/instance: {{ .Release.Name }}
            app.kubernetes.io/component: topology-sync
        spec:
          restartPolicy: Never
          serviceAccountName: {{ include "gremlin-arangodb-poc.fullname" . }}-topology-sync
          securityContext:
            {{- toYaml .Values.podSecurityContext | nindent 12 }}
          containers:
            - name: topology-sync
              image: "{{ .Values.topologySync.image.repository }}@{{ .Values.topologySync.image.digest }}"
              imagePullPolicy: {{ .Values.topologySync.image.pullPolicy }}
              command:
                - python
                - /opt/topology/topology_sync.py
                - --patch-deployment
                - {{ include "gremlin-arangodb-poc.fullname" . | quote }}
                {{- if not .Values.topologySync.prune }}
                - --no-prune
                {{- end }}
              env:
                - name: ARANGO_URL
                  value: {{ printf "http://%s:%v" .Values.arangodb.host .Values.arangodb.port | quote }}
                - name: ARANGO_HOST
                  value: {{ .Values.arangodb.host | quote }}
                - name: ARANGO_PORT
                  value: {{ .Values.arangodb.port | quote }}
                - name: ARANGO_DATABASE
                  value: {{ .Values.arangodb.database | quote }}
                - name: ARANGO_GRAPH
                  value: {{ .Values.arangodb.graph | quote }}
                - name: ARANGO_GRAPH_TYPE
                  value: {{ .Values.arangodb.graphType | quote }}
                - name: ARANGO_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "gremlin-arangodb-poc.secretName" . }}
                      key: {{ .Values.arangodb.auth.usernameKey }}
                - name: ARANGO_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "gremlin-arangodb-poc.secretName" . }}
                      key: {{ .Values.arangodb.auth.passwordKey }}
                - name: POD_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: LOG_LEVEL
                  value: {{ .Values.topologySync.logLevel | quote }}
              volumeMounts:
                - name: topology-script
                  mountPath: /opt/topology
                  readOnly: true
              securityContext:
                {{- toYaml .Values.securityContext | nindent 16 }}
              resources:
                {{- toYaml .Values.topologySync.resources | nindent 16 }}
          volumes:
            - name: topology-script
              configMap:
                name: {{ include "gremlin-arangodb-poc.fullname" . }}-topology-sync
                defaultMode: 0555
{{- end }}
