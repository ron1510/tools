nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: "ghcr.io/example/rest-cache-lab-backend"
  tag: "v0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Empty by default so OpenShift restricted SCC can assign its own UID/GID.
podSecurityContext: {}

# Empty by default; configure it in your platform values if needed.
securityContext: {}

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    memory: 256Mi
